button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{color:var(--blue)}
.hidden{display:none!important}
.muted{color:var(--muted)}
.eyebrow{
  margin:0 0 5px;
  color:var(--accent-2);
  font-size:.76rem;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
}
h1,h2,h3,h4,p{margin-top:0}
h1{font-size:clamp(1.15rem,2vw,1.75rem);margin-bottom:0}
h2{font-size:clamp(1.45rem,2.5vw,2.25rem);line-height:1.12;margin-bottom:10px}
h3{font-size:1.06rem;margin-bottom:10px}
small{color:var(--muted)}
button,.button{
  min-height:42px;
  border:1px solid var(--line);
  border-radius:11px;
  padding:9px 14px;
  background:#202737;
  color:var(--text);
  font-weight:700;
  transition:transform .15s ease,border-color .15s ease,background .15s ease;
}
button:hover{transform:translateY(-1px);border-color:#46536e}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:3px solid rgba(255,106,0,.35);
  outline-offset:2px;
}
button.primary,a.button.primary{background:linear-gradient(135deg,var(--accent),#ff8d35);border-color:transparent;color:white}
a.button{display:inline-flex;align-items:center;justify-content:center;text-decoration:none}
button.danger{background:rgba(255,93,115,.12);border-color:rgba(255,93,115,.45);color:#ffd7dd}
button.success{background:rgba(62,207,142,.12);border-color:rgba(62,207,142,.45);color:#c9ffe8}
button.ghost{background:transparent}
button.icon-btn{
  width:42px;
  min-width:42px;
  padding:0;
  display:grid;
  place-items:center;
  border-radius:50%;
  background:#1a2030;
}
input,select,textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:11px;
  background:#0f1420;
  color:var(--text);
  padding:11px 12px;
}
textarea{min-height:100px;resize:vertical}
label{display:grid;gap:6px;color:var(--muted);font-size:.88rem;font-weight:700}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.form-grid .span2{grid-column:1/-1}
.actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.stack{display:grid;gap:12px}
.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:16px}
.span12{grid-column:span 12}.span8{grid-column:span 8}.span7{grid-column:span 7}
.span6{grid-column:span 6}.span5{grid-column:span 5}.span4{grid-column:span 4}
.span3{grid-column:span 3}
.card{
  min-width:0;
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--radius);
  background:linear-gradient(160deg,rgba(22,22,24,.86),rgba(10,10,12,.88));
  backdrop-filter:blur(8px);
  padding:18px;
  box-shadow:0 8px 28px rgba(0,0,0,.18);
}
.card.hero{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:18px;
  padding:23px;
  background:
    linear-gradient(135deg,rgba(255,106,0,.18),rgba(20,20,22,.90) 45%),
    rgba(14,14,16,.88);
}
.soft-box{
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  background:rgba(11,15,23,.45);
  padding:14px;
}
.list{display:grid;gap:9px}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  background:rgba(10,14,22,.35);
}
.row-main{display:grid;gap:3px;min-width:0}
.row-main strong,.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  width:max-content;
  max-width:100%;
  border-radius:999px;
  padding:5px 9px;
  border:1px solid var(--line);
  background:#242c3c;
  color:#dce3f1;
  font-size:.75rem;
  font-weight:800;
}
.badge.green{background:rgba(62,207,142,.12);border-color:rgba(62,207,142,.35);color:#bff5dd}
.badge.red{background:rgba(255,93,115,.12);border-color:rgba(255,93,115,.35);color:#ffd2d9}
.badge.orange{background:rgba(255,106,0,.13);border-color:rgba(255,106,0,.38);color:#ffd5b4}
.badge.yellow{background:rgba(255,200,87,.12);border-color:rgba(255,200,87,.35);color:#ffe9b4}
.badge.blue{background:rgba(89,167,255,.12);border-color:rgba(89,167,255,.35);color:#d1e8ff}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.kpi{display:flex;align-items:center;justify-content:space-between;gap:12px}
.kpi .big{font-size:clamp(1.8rem,4vw,2.75rem);font-weight:900;line-height:1}
.kpi .label{color:var(--muted);font-size:.82rem;margin-top:5px}
.empty{
  border:1px dashed #3a455e;
  border-radius:13px;
  padding:20px;
  color:var(--muted);
  text-align:center;
}
.divider{height:1px;background:var(--line);margin:16px 0}

.boot-screen,.login-root{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
}
.boot-card,.login-card{
  width:min(100%,520px);
  border:1px solid rgba(255,255,255,.16);
  border-radius:24px;
  background:rgba(16,16,18,.80);
  backdrop-filter:blur(12px);
  padding:28px;
  box-shadow:0 18px 50px rgba(0,0,0,.34);
}
.brand-mark{
  width:72px;height:72px;border-radius:22px;
  display:grid;place-items:center;
  margin-bottom:18px;
  background:linear-gradient(135deg,var(--accent),#ff9c50);
  color:white;font-weight:950;letter-spacing:.05em;
  box-shadow:0 12px 32px rgba(255,106,0,.28);
}
.brand-mark.small{width:46px;height:46px;border-radius:14px;margin:0;font-size:.78rem}
.spinner{
  width:34px;height:34px;border-radius:50%;
  border:3px solid #31394a;border-top-color:var(--accent);
  animation:spin .85s linear infinite;margin-top:18px
}
@keyframes spin{to{transform:rotate(360deg)}}
.role-tabs{
  display:grid;grid-template-columns:repeat(3,1fr);gap:7px;
  padding:6px;border:1px solid var(--line);border-radius:14px;background:#0d121c;margin:18px 0
}
.role-tabs button{min-height:44px;background:transparent;border-color:transparent}
.role-tabs button.active{background:var(--accent);color:white}
.login-help{
  margin-top:14px;
  border-radius:12px;
  padding:12px;
  background:rgba(89,167,255,.08);
  border:1px solid rgba(89,167,255,.2);
  color:#cfe5ff;
  font-size:.85rem;
}
.login-error{
  margin-top:12px;
  color:#ffd3da;
  border:1px solid rgba(255,93,115,.35);
  background:rgba(255,93,115,.1);
  border-radius:11px;
  padding:11px;
}

.app-shell{min-height:100vh}
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;justify-content:space-between;align-items:center;gap:18px;
  padding:13px max(18px,calc((100vw - var(--max))/2));
  border-bottom:1px solid rgba(255,255,255,.12);
  background:rgba(12,12,14,.82);
  backdrop-filter:blur(14px);
}
.brand-block{display:flex;align-items:center;gap:12px}
.session-actions{display:flex;align-items:center;gap:9px}
.session-label{display:grid;text-align:right}
.session-label strong{font-size:.88rem}
.session-label small{font-size:.72rem}
.main-nav{
  position:sticky;top:73px;z-index:25;
  display:flex;gap:7px;overflow-x:auto;
  padding:10px max(18px,calc((100vw - var(--max))/2));
  border-bottom:1px solid rgba(255,255,255,.10);
  background:rgba(12,12,14,.78);
  backdrop-filter:blur(12px);
  scrollbar-width:thin;
}
.main-nav button{
  flex:0 0 auto;
  min-height:39px;
  padding:8px 13px;
  background:transparent;
}
.main-nav button.active{background:rgba(255,106,0,.16);border-color:rgba(255,106,0,.48);color:#ffd7bd}
#app{width:min(var(--max),calc(100% - 32px));margin:0 auto;padding:20px 0 50px}

.trial-banner{
  border:1px solid rgba(255,200,87,.3);
  background:rgba(255,200,87,.08);
  color:#ffe9b3;
  border-radius:12px;
  padding:11px 13px;
}
.repertoire-list{counter-reset:songs}
.repertoire-item{
  display:grid;grid-template-columns:34px minmax(0,1fr) auto;
  align-items:center;gap:11px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:11px;
  background:rgba(8,11,18,.35)
}
.repertoire-item::before{
  counter-increment:songs;content:counter(songs);
  width:28px;height:28px;border-radius:9px;display:grid;place-items:center;
  background:#252e40;color:#cfd6e4;font-size:.78rem;font-weight:900
}
.song-note{color:#ffcfad;font-size:.82rem}
.link-list{display:flex;gap:6px;flex-wrap:wrap}
.link-list a{
  text-decoration:none;border:1px solid var(--line);border-radius:999px;
  padding:5px 8px;font-size:.74rem;font-weight:800;background:#1b2331
}

.calendar-toolbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:13px
}
.calendar-weekdays,.calendar-grid{
  display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px
}
.calendar-weekdays div{text-align:center;color:var(--muted);font-size:.74rem;font-weight:800;padding:5px}
.calendar-day{
  min-height:124px;border:1px solid var(--line);border-radius:13px;background:#111722;padding:8px;
  display:flex;flex-direction:column;gap:7px;overflow:hidden
}
.calendar-day.outside{opacity:.42}
.calendar-day.today{border-color:rgba(255,106,0,.7);box-shadow:inset 0 0 0 1px rgba(255,106,0,.32)}
.calendar-day.admin-clickable:hover{background:#182030;border-color:#4a5874}
.calendar-number{font-size:.76rem;font-weight:900;color:#c7d0df}
.calendar-event{
  border:1px solid rgba(255,106,0,.35);
  background:rgba(255,106,0,.12);
  border-radius:9px;
  padding:7px;
  font-size:.72rem;
  display:grid;gap:2px;
}
.calendar-event.cancelado{border-color:rgba(255,93,115,.35);background:rgba(255,93,115,.1);opacity:.8}
.calendar-event.realizado{border-color:rgba(62,207,142,.35);background:rgba(62,207,142,.09)}
.calendar-event strong{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.calendar-event[draggable=true]{cursor:grab}
.calendar-event[draggable=true]:active{cursor:grabbing}
.calendar-day.drag-over{outline:2px dashed var(--accent);outline-offset:-4px}
.calendar-agenda{display:none}

.attendance-buttons{display:flex;gap:6px;flex-wrap:wrap}
.attendance-buttons button.selected{border-color:var(--accent);background:rgba(255,106,0,.18)}
.status-dot{width:9px;height:9px;border-radius:50%;background:#667087}
.status-dot.voy{background:var(--green)}
.status-dot.no_voy{background:var(--red)}
.status-dot.quiza{background:var(--yellow)}
.status-dot.llego_tarde{background:var(--accent)}
.table-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:13px}
table{width:100%;border-collapse:collapse;min-width:700px}
th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{position:sticky;top:0;background:#1d2432;color:#ccd5e4;font-size:.76rem;text-transform:uppercase;letter-spacing:.06em}
tr:last-child td{border-bottom:0}

.modal{
  position:fixed;inset:0;z-index:100;
  display:grid;place-items:center;padding:18px;
  background:rgba(4,6,10,.72);backdrop-filter:blur(6px)
}
.modal-card{
  width:min(920px,100%);max-height:min(90vh,920px);overflow:auto;
  border:1px solid #3a455e;border-radius:22px;background:#151b27;box-shadow:var(--shadow)
}
.modal-head{
  position:sticky;top:0;z-index:2;
  display:flex;justify-content:space-between;align-items:center;gap:14px;
  padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(21,27,39,.96);backdrop-filter:blur(12px)
}
.modal-body{padding:18px}
.repertoire-editor{display:grid;gap:8px}
.repertoire-edit-row{
  display:grid;grid-template-columns:auto minmax(0,1fr) minmax(160px,.8fr) auto;
  gap:8px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:8px;background:#101620
}
.drag-handle{color:var(--muted);font-size:1.1rem;cursor:grab}
.toast{
  position:fixed;right:18px;bottom:18px;z-index:150;
  max-width:min(420px,calc(100vw - 36px));
  border:1px solid #47536b;border-radius:13px;background:#202839;color:white;
  padding:12px 14px;box-shadow:var(--shadow)
}
.toast.error{border-color:rgba(255,93,115,.55);background:#3a1e29}
.toast.success{border-color:rgba(62,207,142,.5);background:#17352a}
.api-transport{position:fixed;width:1px;height:1px;overflow:hidden;left:-9999px;top:-9999px}

.searchbar{display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:10px;margin-bottom:14px}
.crm-card,.task-card,.offer-card,.gig-card,.proposal-card{
  border:1px solid var(--line);border-radius:14px;padding:14px;background:rgba(8,11,18,.28)
}
.card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.vote-summary{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.progress{
  height:9px;border-radius:99px;overflow:hidden;background:#0c111a;border:1px solid var(--line)
}
.progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#ffae6c)}
.download-link{display:inline-flex;align-items:center;gap:7px;text-decoration:none}

@media (max-width:1000px){

  }

/* v67 · Coach Senior Premium */
.coach-hero{
  position:relative;
  overflow:hidden;
  border-color:rgba(233,202,132,.24);
  background:
    linear-gradient(135deg,rgba(188,146,80,.20),rgba(12,35,68,.90) 46%,rgba(0,7,18,.92));
}
.coach-hero::after{
  content:"";
  position:absolute;
  width:280px;height:280px;border-radius:50%;
  right:-100px;top:-130px;
  border:1px solid rgba(233,202,132,.20);
  box-shadow:0 0 0 28px rgba(53,163,229,.04),0 0 0 58px rgba(233,202,132,.03);
  pointer-events:none;
}
.coach-hero > *{position:relative;z-index:1}
.coach-command{
  display:grid;
  grid-template-columns:minmax(0,1.35fr) minmax(260px,.65fr);
  gap:16px;
}
.coach-score{
  display:grid;
  place-items:center;
  min-height:190px;
  border:1px solid rgba(233,202,132,.20);
  border-radius:20px;
  background:radial-gradient(circle,rgba(53,163,229,.14),rgba(8,14,24,.58) 68%);
  text-align:center;
}
.coach-score .value{font-size:clamp(3rem,8vw,5.2rem);line-height:.9;font-weight:950;color:#E9CA84}
.coach-score small{display:block;margin-top:10px;letter-spacing:.12em;text-transform:uppercase}
.coach-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.coach-kpi{
  border:1px solid rgba(233,202,132,.14);
  border-radius:15px;
  padding:15px;
  background:rgba(6,12,22,.48);
}
.coach-kpi strong{display:block;font-size:1.65rem;line-height:1;color:#E9CA84;margin-bottom:7px}
.coach-kpi span{color:var(--muted);font-size:.82rem}
.coach-quick-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.coach-quick{
  text-align:left;
  min-height:130px;
  display:grid;
  align-content:space-between;
  border-color:rgba(53,163,229,.20);
  background:linear-gradient(150deg,rgba(18,31,50,.94),rgba(9,16,28,.94));
}
.coach-quick strong{font-size:1rem}
.coach-quick small{display:block;margin-top:6px}
.coach-section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.coach-content-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.coach-content-card{
  min-width:0;
  border:1px solid rgba(233,202,132,.12);
  border-radius:16px;
  padding:16px;
  background:linear-gradient(160deg,rgba(15,24,39,.90),rgba(8,14,24,.92));
  display:grid;
  gap:11px;
}
.coach-content-card h3{margin:0}
.coach-content-card p{margin:0}
.coach-content-card .content-body{
  white-space:pre-wrap;
  color:#dfe6f3;
  max-height:280px;
  overflow:auto;
  padding-right:4px;
}
.coach-article-body{
  white-space:pre-wrap;
  line-height:1.65;
  color:#e4e9f3;
  background:rgba(0,7,18,.36);
  border:1px solid rgba(53,163,229,.12);
  border-radius:13px;
  padding:14px;
}
.coach-filterbar{
  display:grid;
  grid-template-columns:minmax(0,1fr) 190px 170px;
  gap:10px;
  margin-bottom:15px;
}
.coach-status-board{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;overflow:auto;padding-bottom:4px}
.coach-status-col{
  border:1px solid rgba(233,202,132,.12);
  border-radius:14px;
  padding:11px;
  background:rgba(6,12,22,.44);
  min-width:150px;
}
.coach-status-col strong{display:block;margin-bottom:7px}
.coach-status-col .count{font-size:1.55rem;color:#E9CA84}
.coach-checklist{display:grid;gap:8px}
.coach-check{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:10px 11px;
  border:1px solid rgba(53,163,229,.12);
  border-radius:11px;
  background:rgba(6,12,22,.34);
}
.coach-check::before{content:"✓";color:var(--green);font-weight:900}
.coach-timeline{display:grid;gap:8px}
.coach-timeline-item{
  display:grid;
  grid-template-columns:86px minmax(0,1fr);
  gap:12px;
  padding:11px;
  border-left:3px solid rgba(233,202,132,.65);
  background:rgba(6,12,22,.34);
  border-radius:0 11px 11px 0;
}
.coach-timeline-item strong{color:#E9CA84}
.coach-metric{
  display:flex;justify-content:space-between;gap:10px;align-items:center;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)
}
.coach-metric:last-child{border-bottom:0}
.coach-textarea-large{min-height:180px}
.coach-textarea-xlarge{min-height:280px}
.coach-editor-note{
  padding:11px 12px;
  border:1px solid rgba(233,202,132,.16);
  border-radius:12px;
  background:rgba(188,146,80,.08);
  color:#f1dfb8;
}
.coach-print{
  border-color:rgba(233,202,132,.22);
}
@media (max-width:1100px){
  .coach-kpis,.coach-quick-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .coach-content-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}

  function applyRuntimeLogo(root=document){
    if(!BRAND_LOGO_SRC) return;
    root.querySelectorAll?.('[data-runtime-logo]').forEach(img=>{
      img.src = BRAND_LOGO_SRC;
      img.removeAttribute('data-runtime-logo');
    });
  }

  function readJson(key, fallback){
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (_) {
      return fallback;
    }
  }

  function writeJson(key, value){
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch (_) {}
  }

  function removeStorage(key){
    try { localStorage.removeItem(key); } catch (_) {}
  }

  function esc(value){
    return String(value == null ? '' : value)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  function attr(value){ return esc(value).replace(/`/g,'&#096;'); }

  function norm(value){
    return String(value || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g,'')
      .trim();
  }

  function slug(value){
    return norm(value)
      .replace(/[^a-z0-9_-]+/g,'-')
      .replace(/^-+|-+$/g,'')
      .slice(0,120);
  }

  function asArray(value){ return Array.isArray(value) ? value : []; }

  function byId(rows, id){ return asArray(rows).find(row => row && row.id === id); }

  function todayIso(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function currentMonth(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function parseDate(value){
    const m = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!m) return null;
    const d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
    return Number.isNaN(d.getTime()) ? null : d;
  }

  function formatDate(value, options = {weekday:'long',day:'numeric',month:'long'}){
    const d = parseDate(value);
    return d ? d.toLocaleDateString('es-ES', options) : 'Fecha pendiente';
  }

  function formatMonth(value){
    const m = String(value || '').match(/^(\d{4})-(\d{2})$/);
    if(!m) return value || '';
    return new Date(Number(m[1]),Number(m[2])-1,1)
      .toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  }

  function formatDateTime(value){
    const d = new Date(value || '');
    return Number.isNaN(d.getTime()) ? '' : d.toLocaleString('es-ES',{dateStyle:'short',timeStyle:'short'});
  }

  function addDays(iso, days){
    const d = parseDate(iso);
    if(!d) return '';
    d.setDate(d.getDate()+Number(days || 0));
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function monthKey(date){
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
  }

  function money(value){
    const n = Number(value || 0);
    return Number.isFinite(n) ? new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n) : '—';
  }

  function roleLabel(role){
    return ({admin:'Miguel / Admin',musico:'Músico',coach:'Coach Senior'}[role] || role || '');
  }

  function statusBadge(status){
    const s = norm(status).replace(/\s+/g,'_');
    const cls = ['voy','pagado','aceptada','confirmado','realizado','hecha','cerrado','bien'].includes(s)
      ? 'green'
      : ['no_voy','cancelado','rechazada','perdido','bloqueada'].includes(s)
        ? 'red'
        : ['quiza','pendiente','borrador','activa'].includes(s)
          ? 'yellow'
          : ['llego_tarde','seguimiento','probando','en_curso','negociacion'].includes(s)
            ? 'orange'
            : 'blue';
    return `<span class="badge ${cls}">${esc(labelStatus(status))}</span>`;
  }

  function labelStatus(status){
    const key = String(status || '').toLowerCase();
    return ({
      programado:'Programado',cancelado:'Cancelado',realizado:'Realizado',
      pendiente:'Pendiente',voy:'Voy',no_voy:'No voy',quiza:'Quizá',llego_tarde:'Llego tarde',
      pagado:'Pagado',activa:'Activa',activo:'Activo',aceptada:'Aceptada',rechazada:'Rechazada',

      indiferente:'Me da igual',hecha:'Hecha',en_curso:'En curso',bloqueada:'Bloqueada',
      borrador:'Borrador',confirmado:'Confirmado',negociacion:'Negociación',
      nuevo:'Nuevo',contactado:'Contactado',seguimiento:'Seguimiento',propuesta:'Propuesta',
      cerrado:'Cerrado',perdido:'Perdido',enviada:'Enviada',caducada:'Caducada',

  function sha256Fallback(text){
    const ascii = unescape(encodeURIComponent(String(text)));
    function rightRotate(value, amount){ return (value >>> amount) | (value << (32 - amount)); }
    const mathPow = Math.pow;
    const maxWord = mathPow(2,32);
    let result = '';
    let words = [];
    const asciiBitLength = ascii.length * 8;
    const hash = sha256Fallback.h = sha256Fallback.h || [];
    const k = sha256Fallback.k = sha256Fallback.k || [];
    let primeCounter = k.length;
    const isComposite = {};
    let i,j;
    for(let candidate=2; primeCounter<64; candidate++){
      if(!isComposite[candidate]){
        for(i=0;i<313;i+=candidate) isComposite[i]=candidate;
        hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
        k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
      }
    }
    let padded = ascii + '\x80';
    while(padded.length % 64 - 56) padded += '\x00';
    for(i=0;i<padded.length;i++){
      j=padded.charCodeAt(i);
      if(j>>8) throw new Error('Texto no compatible');
      words[i>>2] |= j << ((3-i)%4)*8;
    }
    words[words.length]=((asciiBitLength/maxWord)|0);
    words[words.length]=(asciiBitLength);
    for(j=0;j<words.length;){
      const w=words.slice(j,j+=16);
      const oldHash=hash.slice(0);
      let working=hash.slice(0,8);
      for(i=0;i<64;i++){
        const w15=w[i-15], w2=w[i-2];
        const a=working[0], e=working[4];
        const temp1=working[7]
          +(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))
          +((e&working[5])^((~e)&working[6]))
          +k[i]
          +(w[i]=(i<16)?w[i]:(
            w[i-16]
            +(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))
            +w[i-7]
            +(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10))
          )|0);
        const temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))
          +((a&working[1])^(a&working[2])^(working[1]&working[2]));
        working=[(temp1+temp2)|0].concat(working);
        working[4]=(working[4]+temp1)|0;
        working.pop();
      }
      for(i=0;i<8;i++) hash[i]=(working[i]+oldHash[i])|0;
    }
    for(i=0;i<8;i++){
      for(j=3;j+1;j--){
        const b=(hash[i]>>(j*8))&255;
        result += (b<16?'0':'')+b.toString(16);
      }
    }
    return result;
  }

  async function sha256(text){
    if(window.crypto?.subtle && window.TextEncoder){
      const buffer = await window.crypto.subtle.digest('SHA-256',new TextEncoder().encode(String(text)));
      return Array.from(new Uint8Array(buffer),b=>b.toString(16).padStart(2,'0')).join('');
    }
    return sha256Fallback(text);
  }

  function pinProof(account,pin){

  async function appsScriptCall(action,data={},sessionOverride=null){
    if(window.__BCB58_TEST_API__){
      return Promise.resolve(window.__BCB58_TEST_API__(action,data,'CLOUDFLARE'));
    }

    const session = sessionOverride || state.session || {};
    const request = {
      action:String(action || ''),
      account:String(session.account || ''),
      token:String(session.token || ''),
      data:data && typeof data === 'object' ? data : {}
    };

    const controller = new AbortController();
    const timer = setTimeout(()=>controller.abort(),API_TIMEOUT);

    try{
      const response = await fetch('/api',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Accept':'application/json'
        },
        credentials:'same-origin',
        cache:'no-store',
        body:JSON.stringify(request),
        signal:controller.signal
      });

      let payload;
      try{
        payload = await response.json();
      }catch(_){
        throw new Error('El servidor ha devuelto una respuesta no válida.');
      }

      if(!response.ok){
        throw new Error(payload?.message || `Error de conexión (${response.status}).`);
      }

      return payload || {
        ok:false,
        code:'EMPTY_RESPONSE',
        message:'Respuesta vacía.'
      };
    }catch(error){
      if(error && error.name === 'AbortError'){
        throw new Error('La operación está tardando demasiado. Pulsa Reintentar.');
      }
      throw new Error(
        error && error.message
          ? error.message
          : 'No se ha podido conectar con APP-BCB.'
      );
    }finally{
      clearTimeout(timer);
    }
  }

  function apiGet(action,params={}){
    return appsScriptCall(action,params,{account:'',token:''});
  }

  function apiPost(action,data={},sessionOverride=null){
    return appsScriptCall(action,data,sessionOverride || state.session || {});
  }

  function apiError(response,fallback='No se ha podido completar la operación.'){
    if(response?.code === 'TOKEN_EXPIRED' || response?.code === 'BAD_TOKEN'){
      clearSession();
      renderLogin('La sesión ha caducado. Vuelve a entrar.');
    }
    return response?.message || fallback;
  }
async function start(){
    document.title = `APP-BCB 8 · ${VERSION}`;
    if(!apiReady()){
      showBootError('No se ha podido iniciar la conexión segura de APP-BCB.');
      return;
    }

    // v65: si ya existe una sesión, se intenta entrar directamente.
    // Se evita la llamada previa a "accounts", que solo es necesaria para mostrar el login.
    if(state.session?.token && state.session?.account){
      try{
        dom.bootText.textContent = 'Abriendo APP-BCB…';
        await loadData();
        showApp();
        return;
      }catch(_){
        clearSession();
      }
    }

    try{
      dom.bootText.textContent = 'Preparando el acceso…';
      const accounts = await apiGet('accounts');
      if(!accounts.ok) throw new Error(apiError(accounts,'El servidor central no está disponible.'));
      state.accounts = accounts;
      renderLogin();
    }catch(error){
      showBootError(error.message || 'No se ha podido conectar con el servidor.');
    }
  }

    if(!account) return showToast('Selecciona tu nombre.','error');
    if(!/^\d{4}$/.test(pin)) return showToast('El PIN debe tener cuatro cifras.','error');

    setBusy(true,'Comprobando acceso…');
    try{
      const proof = await pinProof(account,pin);

      if(!response.ok) throw new Error(apiError(response,'PIN incorrecto.'));

    if(!state.data) state.data = {};
    Object.keys(response || {}).forEach(key=>{
      if(['ok','module','version','generatedAt'].includes(key)) return;
      state.data[key] = response[key];

  const PREFETCH_MODULES_65 = {
    admin:['calendar','attendance','payments','repertoire','proposals','tasks'],
    musico:['calendar','repertoire','proposals'],
    coach:['calendar','repertoire','attendance','closure','proposals','coachhub']
  };

  function prefetchCommon65_(){
    if(!state.session || !state.data || state.prefetchPromise) return state.prefetchPromise;

    const modules = PREFETCH_MODULES_65[state.session.role] || [];
    state.prefetchModules = new Set(modules);
    const revisionAtStart = state.dataRevision || 0;

    state.prefetchPromise = apiPost('prefetch',{},state.session)
      .then(response=>{
        if(!response?.ok) throw new Error(apiError(response));
        // No sobrescribir un cambio guardado mientras la precarga estaba en curso.
        if((state.dataRevision || 0) !== revisionAtStart) return response;

        mergeModuleData(response);
        asArray(response.loadedModules).forEach(module=>state.loadedModules.add(module));
        return response;
      })
      .catch(error=>{
        console.warn('Precarga v65 no disponible:',error);
        return null;
      })
      .finally(()=>{
        state.prefetchPromise = null;
        state.prefetchModules = new Set();
      });

    return state.prefetchPromise;
  }

  function upsertLocal65_(collection,item,key='id'){
    if(!item || !state.data) return;
    const list = asArray(state.data[collection]).slice();
    const value = item[key];
    const index = list.findIndex(row=>row && row[key]===value);
    if(index >= 0) list[index] = item;
    else list.push(item);
    state.data[collection] = list;
  }

  function removeLocal65_(collection,predicate){
    if(!state.data) return;
    state.data[collection] = asArray(state.data[collection]).filter(row=>!predicate(row));
  }

        .filter(row=>row.month!==month)
        .concat(fresh);
      if(state.data.band){

async function ensureViewData(view,{force=false}={}){
    const module = moduleForView(view);
    if(!module) return;
    if(!force && state.loadedModules?.has(module)) return;

    // Si el módulo forma parte de la precarga en curso, espera esa única llamada
    // en lugar de lanzar una lectura duplicada.
    if(!force && state.prefetchPromise && state.prefetchModules?.has(module)){
      setBusy(true,`Cargando ${viewLabel(view)}…`);
      try{
        await state.prefetchPromise;
        if(state.loadedModules?.has(module)) return;
      }finally{
        setBusy(false);
      }
    }

    setBusy(true,`Cargando ${viewLabel(view)}…`);
    try{
      const response = await apiPost('moduleLoad',{module,force:!!force},state.session);
      if(!response.ok) throw new Error(apiError(response));
      mergeModuleData(response);
      if(!state.loadedModules) state.loadedModules = new Set();
      state.loadedModules.add(module);
    }finally{
      setBusy(false);
    }
  }

  function nextRehearsal(){
    const today = todayIso();
    return rehearsals()
      .filter(r=>r.status !== 'cancelado' && r.date >= today)
      .sort((a,b)=>`${a.date} ${a.start}`.localeCompare(`${b.date} ${b.start}`))[0] || null;
  }

  function previousRehearsal(rehearsal){
    if(!rehearsal) return null;
    return rehearsals()
      .filter(r=>r.status !== 'cancelado' && r.date < rehearsal.date)
      .sort((a,b)=>`${b.date} ${b.start}`.localeCompare(`${a.date} ${a.start}`))[0] || null;
  }

  function memberName(id){
    return allMembers().find(m=>m.id===id)?.name || id || '';
  }

  function songInfo(id,title=''){
    return songs().find(s=>s.id===id) || {id,title:title || id,artist:'',links:[]};
  }

  function repertoireFor(rehearsal){
    return asArray(rehearsal?.repertoire).map(item=>{
      const song = songInfo(item.songId,item.title);
      return {
        songId:item.songId || song.id,
        title:item.title || song.title,
        artist:item.artist || song.artist,
        note:item.note || '',
        links:asArray(song.links),
        tracks:!!song.tracks
      };
    });
  }

  function attendanceFor(rehearsalId,memberId){
    return attendance().find(row=>row.rehearsalId===rehearsalId && row.memberId===memberId)
      || {rehearsalId,memberId,status:'pendiente',comment:''};
  }

  function paymentFor(month,memberId){
    const found = payments().find(row=>row.month===month && row.memberId===memberId);
    return found
      ? {...found,exists:true}
      : {month,memberId,status:'pendiente',amount:0,method:'',notes:'',paidAt:'',exists:false};
  }

  function paymentAmount(payment){
    const amount = Number(payment?.amount);
    return Number.isFinite(amount) && amount >= 0 ? amount : 0;
  }

  function defaultQuota(memberId){
    const payers = members().filter(member=>member.active !== false && member.pays !== false);
    const total = Number(data().band?.localRentTotal || 217);
    if(!payers.some(member=>member.id===memberId)) return 0;
    return Math.round((total / Math.max(1,payers.length))*100)/100;
  }

  function votesFor(proposalId){
    return votes().filter(v=>v.proposalId===proposalId);
  }

  function ownVote(proposalId){
    return votesFor(proposalId).find(v=>v.memberId===state.session.account)
      || {proposalId,memberId:state.session.account,vote:'pendiente',comment:''};

  function closureFor(rehearsalId){
    return closures().find(c=>c.rehearsalId===rehearsalId)
      || {rehearsalId,general:'',songs:[]};
  }

  function repertoireDiff(rehearsal){
    const current = repertoireFor(rehearsal);
    const previous = repertoireFor(previousRehearsal(rehearsal));
    const currentIds = current.map(x=>x.songId);
    const previousIds = previous.map(x=>x.songId);
    const added = current.filter(x=>!previousIds.includes(x.songId));
    const removed = previous.filter(x=>!currentIds.includes(x.songId));
    const reordered = current.filter((x,index)=>{
      const prevIndex = previousIds.indexOf(x.songId);
      return prevIndex >= 0 && prevIndex !== index;
    });
    return {added,removed,reordered};
  }

  function coachReadiness(){
    const next = nextRehearsal();
    if(!next) return {score:0,label:'Sin ensayo programado',confirmed:0,total:members().length,rep:0};
    const att = members().map(member=>attendanceFor(next.id,member.id));
    const confirmed = att.filter(row=>row.status==='voy').length;
    const total = Math.max(1,members().length);
    const rep = repertoireFor(next).length;
    const previous = previousRehearsal(next);
    const hasClosure = previous ? !!closures().find(row=>row.rehearsalId===previous.id) : false;
    const attendanceScore = Math.round((confirmed/total)*35);
    const repertoireScore = Math.min(25,rep*3);
    const objectiveScore = next.objective ? 15 : 0;
    const closureScore = hasClosure ? 15 : 0;
    const statusScore = ['confirmado','programado'].includes(next.status) ? 10 : 4;
    const score = Math.min(100,attendanceScore+repertoireScore+objectiveScore+closureScore+statusScore);
    return {
      score,
      label:score>=85?'Preparación alta':score>=65?'Preparación media':score>=40?'Necesita atención':'Preparación baja',
      confirmed,total,rep
    };
  }

  function viewCalendar(){

    const events = rehearsals().filter(r=>r.date===day.iso);

async function mutate(action,payload,successMessage='Guardado.'){
    setBusy(true,'Guardando…');
    try{
      const response = await apiPost(action,payload,state.session);
      if(!response.ok) throw new Error(apiError(response));

      // v65: el servidor ya devuelve la fila guardada.
      // Se actualiza el estado local y se evita recargar bootstrap + módulo.
      applyMutationResponse65_(action,response,payload);
      state.dataRevision = (state.dataRevision || 0) + 1;
      if(state.data) state.data.generatedAt = response.generatedAt || new Date().toISOString();

      render();
      if(successMessage) showToast(successMessage,'success');
      return response;
    }catch(error){
      showToast(error.message || 'No se ha podido guardar.','error');
      throw error;
    }finally{
      setBusy(false);
    }
  }

  function distributePayments(){
    const amountInputs = Array.from(document.querySelectorAll('[data-pay-amount]'));
    if(!amountInputs.length) return;

    const totalInput = document.getElementById('paymentLocalRentTotal');
    const total = Number(totalInput?.value || 0);
    if(!Number.isFinite(total) || total < 0){
      showToast('Introduce un coste mensual válido.','error');
      return;
    }

    const totalCents = Math.round(total * 100);
    const baseCents = Math.floor(totalCents / amountInputs.length);
    let remainder = totalCents - (baseCents * amountInputs.length);

    amountInputs.forEach(input=>{
      const cents = baseCents + (remainder > 0 ? 1 : 0);
      if(remainder > 0) remainder -= 1;
      input.value = (cents / 100).toFixed(2);
    });

    showToast('Cuotas repartidas. Puedes modificar cualquier importe antes de guardar.','success');
  }

  async function saveAllPayments(){
    const month = state.filters.month || currentMonth();
    const localRentTotal = Number(document.getElementById('paymentLocalRentTotal')?.value || 0);
    if(!Number.isFinite(localRentTotal) || localRentTotal < 0){
      showToast('Introduce un coste mensual válido.','error');
      return;
    }

    const rows = Array.from(document.querySelectorAll('[data-payment-row]')).map(row=>{
      const memberId = row.dataset.paymentRow;
      const q = attribute => row.querySelector(`[${attribute}="${CSS.escape(memberId)}"]`);
      return {
        memberId,
        amount:Number(q('data-pay-amount')?.value || 0),
        status:q('data-pay-status')?.value || 'pendiente',
        method:q('data-pay-method')?.value || '',
        notes:q('data-pay-notes')?.value || '',
        paidAt:paymentFor(month,memberId).paidAt || ''
      };
    });

    if(rows.some(row=>!Number.isFinite(row.amount) || row.amount < 0)){
      showToast('Hay una cuota no válida.','error');
      return;
    }

    await mutate('paymentsBatchSave',{
      month,
      localRentTotal,
      payments:rows
    },`Pagos de ${formatMonth(month)} guardados: ${rows.length} músicos.`);
  }

  async function handleClick(event){
    const target = event.target.closest('button,a,[data-open-rehearsal],[data-calendar-day]');
    if(!target) return;

    if(target.matches('[data-login-role]')){
      state.roleChoice = target.dataset.loginRole;
      renderLogin();
      return;
    }

    if(target.matches('[data-cancel-pin]')){
      renderLogin();
      return;
    }

    if(target.matches('[data-view]')){
      const view = target.dataset.view;
      if(canView(view)){
        try{
          await ensureViewData(view);
          state.view = view;
          writeJson(UI_KEY,{view});
          render();
        }catch(error){
          showToast(error.message || 'No se ha podido cargar el módulo.','error');
        }
      }
      return;
    }

    if(target.matches('[data-calendar-prev]')){
      state.calendarDate = new Date(state.calendarDate.getFullYear(),state.calendarDate.getMonth()-1,1);
      render();
      return;
    }
    if(target.matches('[data-calendar-next]')){
      state.calendarDate = new Date(state.calendarDate.getFullYear(),state.calendarDate.getMonth()+1,1);
      render();
      return;
    }
    if(target.matches('[data-calendar-today]')){
      state.calendarDate = new Date();
      render();
      return;
    }

    if(target.matches('[data-new-rehearsal]')){
      openRehearsalEditor();
      return;
    }
    if(target.matches('[data-add-on-day]')){
      openRehearsalEditor('',target.dataset.addOnDay);
      return;
    }
    if(target.matches('[data-open-rehearsal]')){
      event.stopPropagation();
      const id = target.dataset.openRehearsal;
      if(state.session.role==='admin') openRehearsalEditor(id);
      else openRehearsalReadOnly(id);
      return;
    }
    if(target.matches('[data-calendar-day]') && state.session.role==='admin'){
      if(!event.target.closest('[data-open-rehearsal]')){
        openRehearsalEditor('',target.dataset.calendarDay);
      }
      return;
    }

    if(target.matches('[data-attendance-value]')){
      document.querySelectorAll('[data-attendance-value]').forEach(btn=>btn.classList.remove('selected'));
      target.classList.add('selected');
      return;
    }
    if(target.matches('[data-save-own-attendance]')){
      saveOwnAttendance(target.dataset.saveOwnAttendance);
      return;
    }
    if(target.matches('[data-save-admin-attendance]')){
      saveAdminAttendance(target.dataset.saveAdminAttendance);
      return;
    }
    if(target.matches('[data-distribute-payments]')){
      distributePayments();
      return;
    }
    if(target.matches('[data-save-all-payments]')){
      saveAllPayments();
      return;
    }

    if(target.matches('[data-new-proposal]')){
      openProposalEditor();
      return;
    }
    if(target.matches('[data-edit-proposal]')){
      openProposalEditor(target.dataset.editProposal);
      return;
    }
    if(target.matches('[data-delete-proposal]')){
      if(confirm('¿Eliminar esta propuesta y sus votos?')){
        mutate('proposalDelete',{id:target.dataset.deleteProposal},'Propuesta eliminada.');
      }
      return;
    }
    if(target.matches('[data-vote-proposal]')){
      voteProposal(target.dataset.voteProposal,target.dataset.vote);
      return;
    }

    if(target.matches('[data-new-task]')){ openTaskEditor(); return; }
    if(target.matches('[data-edit-task]')){ openTaskEditor(target.dataset.editTask); return; }
    if(target.matches('[data-delete-task]')){
      if(confirm('¿Eliminar esta tarea?')) mutate('taskDelete',{id:target.dataset.deleteTask},'Tarea eliminada.');
      return;
    }

    if(target.matches('[data-new-gig]')){ openGigEditor(); return; }
    if(target.matches('[data-edit-gig]')){ openGigEditor(target.dataset.editGig); return; }
    if(target.matches('[data-delete-gig]')){
      if(confirm('¿Eliminar este concierto?')) mutate('gigDelete',{id:target.dataset.deleteGig},'Concierto eliminado.');
      return;
    }

    if(target.matches('[data-new-crm]')){ openCrmEditor(); return; }
    if(target.matches('[data-edit-crm]')){ openCrmEditor(target.dataset.editCrm); return; }
    if(target.matches('[data-delete-crm]')){
      if(confirm('¿Eliminar este contacto del CRM?')) mutate('crmDelete',{id:target.dataset.deleteCrm},'Contacto eliminado.');
      return;
    }

    if(target.matches('[data-new-offer]')){ openOfferEditor(); return; }
    if(target.matches('[data-edit-offer]')){ openOfferEditor(target.dataset.editOffer); return; }
    if(target.matches('[data-delete-offer]')){
      if(confirm('¿Eliminar este presupuesto?')) mutate('offerDelete',{id:target.dataset.deleteOffer},'Presupuesto eliminado.');
      return;
    }


    if(target.matches('[data-cancel-modal]')){ closeModal(); return; }
    if(target.matches('[data-print-coach]')){ window.print(); return; }

    if(target.matches('[data-new-coach-report]')){ openCoachReportEditor(); return; }
    if(target.matches('[data-open-coach-report]')){ openCoachReportReader(target.dataset.openCoachReport); return; }
    if(target.matches('[data-edit-coach-report]')){ openCoachReportEditor(target.dataset.editCoachReport); return; }
    if(target.matches('[data-delete-coach-report]')){
      if(confirm('¿Eliminar este informe Coach?')) mutate('coachReportDelete',{id:target.dataset.deleteCoachReport},'Informe eliminado.');
      return;
    }

    if(target.matches('[data-new-coach-article]')){ openCoachArticleEditor(); return; }
    if(target.matches('[data-read-coach-article]')){ openCoachArticleReader(target.dataset.readCoachArticle); return; }
    if(target.matches('[data-edit-coach-article]')){ openCoachArticleEditor(target.dataset.editCoachArticle); return; }
    if(target.matches('[data-delete-coach-article]')){
      if(confirm('¿Eliminar este artículo de la biblioteca?')) mutate('coachArticleDelete',{id:target.dataset.deleteCoachArticle},'Artículo eliminado.');
      return;
    }

    if(target.matches('[data-new-coach-video]')){ openCoachVideoEditor(); return; }
    if(target.matches('[data-open-coach-video]')){ openCoachVideoReader(target.dataset.openCoachVideo); return; }
    if(target.matches('[data-edit-coach-video]')){ openCoachVideoEditor(target.dataset.editCoachVideo); return; }
    if(target.matches('[data-delete-coach-video]')){
      if(confirm('¿Eliminar esta producción de vídeo?')) mutate('coachVideoDelete',{id:target.dataset.deleteCoachVideo},'Vídeo eliminado.');
      return;
    }

    if(target.matches('[data-new-coach-stage]')){ openCoachStageEditor(); return; }
    if(target.matches('[data-open-coach-stage]')){ openCoachStageReader(target.dataset.openCoachStage); return; }
    if(target.matches('[data-edit-coach-stage]')){ openCoachStageEditor(target.dataset.editCoachStage); return; }
    if(target.matches('[data-delete-coach-stage]')){
      if(confirm('¿Eliminar este plan de escena?')) mutate('coachStageDelete',{id:target.dataset.deleteCoachStage},'Plan eliminado.');
      return;
    }

    if(target.matches('[data-download-backup]')){
      downloadJson(`APP_BCB_8_V68_BACKUP_${todayIso()}.json`,state.data);
      return;
    }

    if(target.matches('[data-repertoire-remove]')){
      target.closest('[data-repertoire-row]')?.remove();
      ensureRepertoireEditorNotEmpty();
      return;
    }
    if(target.matches('[data-repertoire-up]')){
      const row = target.closest('[data-repertoire-row]');
      const prev = row?.previousElementSibling;
      if(row && prev) row.parentNode.insertBefore(row,prev);
      return;
    }
    if(target.matches('[data-repertoire-down]')){
      const row = target.closest('[data-repertoire-row]');
      const next = row?.nextElementSibling;
      if(row && next) row.parentNode.insertBefore(next,row);
      return;
    }
    if(target.matches('[data-copy-previous-repertoire]')){
      const date = document.getElementById('rehearsalDate')?.value || '';
      const current = {date};
      const previous = rehearsals()
        .filter(r=>r.status!=='cancelado' && r.date<date)
        .sort((a,b)=>b.date.localeCompare(a.date))[0];
      setRepertoireEditor(previous ? repertoireFor(previous) : []);
      if(!previous) showToast('No hay un ensayo anterior con repertorio.','error');
      return;
    }
    if(target.matches('[data-use-setlist]')){
      const rows = asArray(data().setlist).map(item=>{
        const song = songs().find(s=>s.id===item.songId) || songs().find(s=>norm(s.title)===norm(item.title)) || {};
        return {songId:song.id || slug(item.title),title:item.title,artist:song.artist || '',note:item.notes || ''};
      });
      setRepertoireEditor(rows);
      return;
    }
    if(target.matches('[data-duplicate-rehearsal]')){
      const id = document.getElementById('rehearsalId')?.value;
      if(id) duplicateRehearsal(id);
      return;
    }
    if(target.matches('[data-delete-rehearsal]')){
      const id = document.getElementById('rehearsalId')?.value;
      if(id) deleteRehearsal(id);
      return;
    }
  }

  function handleChange(event){
    const target = event.target;
    if(target.id==='attendanceRehearsal'){
      state.selectedRehearsalId = target.value;
      render();
      return;
    }
    if(target.id==='paymentMonth'){
      state.filters.month = target.value || currentMonth();
      render();
      return;
    }
    if(target.id==='closureRehearsal'){
      state.selectedRehearsalId = target.value;
      render();
      return;
    }
    if(target.id==='repertoireSearch'){
      state.filters.search = target.value;
      render();
      return;
    }
    if(target.id==='crmSearch'){
      state.filters.search = target.value;
      render();
      return;
    }
    if(target.id==='crmStatus'){
      state.filters.status = target.value;
      render();
      return;
    }
    if(target.id==='coachLibraryCategory'){
      state.filters.coachCategory = target.value || 'todos';
      render();
      return;
    }
    if(target.id==='coachLibraryStatus'){
      state.filters.coachStatus = target.value || 'todos';
      render();
      return;
    }
    if(target.id==='repertoireAdd'){
      const song = songInfo(target.value);
      if(song?.id){
        const current = readRepertoireEditor();
        if(!current.some(item=>item.songId===song.id)){
          current.push({songId:song.id,title:song.title,artist:song.artist,note:''});
          setRepertoireEditor(current);
        }
      }
      target.value='';
      return;
    }
  }

  function handleInput(event){
    const target = event.target;
    const supported=['repertoireSearch','crmSearch','coachLibrarySearch'];
    if(!supported.includes(target.id)) return;
    if(target.id==='coachLibrarySearch') state.filters.coachSearch = target.value;
    else state.filters.search = target.value;
    clearTimeout(filterTimer);
    filterTimer = setTimeout(()=>{
      const activeId = document.activeElement?.id || '';
      render();
      const field = document.getElementById(activeId);
      if(field){
        field.focus();
        try{ field.setSelectionRange(field.value.length,field.value.length); }catch(_){}
      }
    },180);
  }

  function handleSubmit(event){
    const form = event.target;
    if(form.id==='loginForm'){
      event.preventDefault();
      submitLogin();
      return;
    }
    if(form.id==='rehearsalForm'){
      event.preventDefault();
      saveRehearsal();
      return;
    }
    if(form.id==='proposalForm'){
      event.preventDefault();
      saveProposal();
      return;
    }
    if(form.id==='closureForm'){
      event.preventDefault();
      saveClosure();
      return;
    }
    if(form.id==='taskForm'){
      event.preventDefault();
      saveTask();
      return;
    }
    if(form.id==='gigForm'){
      event.preventDefault();
      saveGig();
      return;
    }
    if(form.id==='crmForm'){
      event.preventDefault();
      saveCrm();
      return;
    }
    if(form.id==='offerForm'){
      event.preventDefault();
      saveOffer();
      return;
    }
    if(form.id==='coachReportForm'){
      event.preventDefault();
      saveCoachReport();
      return;
    }
    if(form.id==='coachArticleForm'){
      event.preventDefault();
      saveCoachArticle();
      return;
    }
    if(form.id==='coachVideoForm'){
      event.preventDefault();
      saveCoachVideo();
      return;
    }
    if(form.id==='coachStageForm'){
      event.preventDefault();
      saveCoachStage();
      return;
    }
  }

  function openRehearsalReadOnly(id){
    const rehearsal = byId(rehearsals(),id);
    if(!rehearsal) return;
    const diff = repertoireDiff(rehearsal);
    openModal('Detalle del ensayo',`
      <div class="stack">
        <div class="soft-box">
          <p class="eyebrow">${esc(formatDate(rehearsal.date))}</p>
          <h3>${esc(rehearsal.start)}–${esc(rehearsal.end)} · ${esc(rehearsal.place)}</h3>
          <div class="chips">${statusBadge(rehearsal.status)}<span class="badge blue">${repertoireFor(rehearsal).length} temas</span>${diff.added.length?`<span class="badge orange">${diff.added.length} nuevos</span>`:''}</div>
        </div>
        ${rehearsal.objective?`<div><h3>Objetivo</h3><p>${esc(rehearsal.objective)}</p></div>`:''}
        ${rehearsal.notes?`<div><h3>Observaciones</h3><p>${esc(rehearsal.notes)}</p></div>`:''}
        <div><h3>Repertorio</h3>${repertoireHtml(rehearsal)}</div>
      </div>`);
  }

  function setRepertoireEditor(items){
    const editor = document.getElementById('repertoireEditor');
    if(!editor) return;
    const unique = [];
    const seen = new Set();
    asArray(items).forEach(item=>{
      if(!item.songId || seen.has(item.songId)) return;
      seen.add(item.songId);
      unique.push(item);
    });
    editor.innerHTML = unique.length
      ? unique.map(repertoireEditRow).join('')
      : '<div class="empty">No hay temas añadidos.</div>';
  }

  function ensureRepertoireEditorNotEmpty(){
    const editor = document.getElementById('repertoireEditor');
    if(editor && !editor.querySelector('[data-repertoire-row]')){
      editor.innerHTML = '<div class="empty">No hay temas añadidos.</div>';
    }
  }

  function handleDragStart(event){
    const calendarEvent = event.target.closest('.calendar-event[draggable="true"]');
    if(calendarEvent){
      draggedRehearsalId = calendarEvent.dataset.openRehearsal || '';
      event.dataTransfer.effectAllowed='move';
      event.dataTransfer.setData('text/plain',draggedRehearsalId);
      return;
    }
    const row = event.target.closest('[data-repertoire-row]');
    if(row){
      row.classList.add('dragging');
      event.dataTransfer.effectAllowed='move';
      event.dataTransfer.setData('text/repertoire',row.dataset.songId || '');
    }
  }

  function handleDragOver(event){
    const day = event.target.closest('[data-calendar-day]');
    if(day && draggedRehearsalId && state.session.role==='admin'){
      event.preventDefault();
      day.classList.add('drag-over');
      return;
    }
    const row = event.target.closest('[data-repertoire-row]');
    const dragging = document.querySelector('[data-repertoire-row].dragging');
    if(row && dragging && row!==dragging){
      event.preventDefault();
      const box=row.getBoundingClientRect();
      const after=event.clientY>box.top+box.height/2;
      row.parentNode.insertBefore(dragging,after?row.nextSibling:row);
    }
  }

  function handleDrop(event){
    const day = event.target.closest('[data-calendar-day]');
    if(day && draggedRehearsalId && state.session.role==='admin'){
      event.preventDefault();
      day.classList.remove('drag-over');
      const id=draggedRehearsalId;
      draggedRehearsalId='';
      moveRehearsal(id,day.dataset.calendarDay);
    }
  }

  function handleDragEnd(){
    draggedRehearsalId='';
    document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
    document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  }

  dom.modalClose.addEventListener('click',closeModal);
  dom.modal.addEventListener('click',event=>{ if(event.target===dom.modal) closeModal(); });
  dom.logout.addEventListener('click',logout);
  dom.refresh.addEventListener('click',async()=>{
    try{
      const homeViews = ['dashboard','musician','coach'];
      if(homeViews.includes(state.view)){
        await loadData({force:true});
      }else{
        await ensureViewData(state.view,{force:true});
      }
      render();
      showToast('Datos actualizados.','success');
    }catch(error){
      showToast(error.message,'error');
    }
  });

  document.addEventListener('click',handleClick);
  document.addEventListener('change',handleChange);
  document.addEventListener('input',handleInput);
  document.addEventListener('submit',handleSubmit);
  document.addEventListener('dragstart',handleDragStart);
  document.addEventListener('dragover',handleDragOver);
  document.addEventListener('drop',handleDrop);
  document.addEventListener('dragend',handleDragEnd);
  document.addEventListener('keydown',event=>{
    if(event.key==='Escape' && !dom.modal.classList.contains('hidden')) closeModal();
  });
  window.addEventListener('unhandledrejection',event=>{
    event.preventDefault();
    console.error('Operación no completada',event.reason);
  });

  window.APP_BCB_8_V58 = {
    version:VERSION,
    state,
    render,
    loadData,
    nextRehearsal,
    repertoireDiff,
    openRehearsalEditor,
    logout
  };

  start();
})();

  </script>
</body>
</html>
